name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test and vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  hardening:
    name: Hardening checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Race test
        run: go test -race ./...

      - name: Install golangci-lint
        run: GOBIN="$HOME/go/bin" go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Lint
        run: "$HOME/go/bin/golangci-lint" run --config .golangci.yml ./...

      - name: Install govulncheck
        run: GOBIN="$HOME/go/bin" go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Vulnerability scan
        run: "$HOME/go/bin/govulncheck" ./...

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: be-go-template-api:ci
